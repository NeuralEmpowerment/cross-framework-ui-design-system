version: 2
updates:
  # Keep GitHub Actions SHA pins current — Dependabot opens PRs that bump the
  # pinned SHA and update the version comment, keeping every update reviewable.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # npm/pnpm dependencies across the monorepo. Dependabot reads the workspace
  # lock file and proposes grouped updates for outdated/vulnerable packages.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"
          - "eslint-plugin-storybook"
